<!-- CÓDIGO DE COMIDA Y AGUA -->
<script>

let hambre = 80;
let agua = 90;

function alimentar(comida){

    hambre += 5;

    if(hambre > 100){
        hambre = 100;
    }

    document.getElementById("hambre").value = hambre;

    document.getElementById("mensaje").innerHTML =
    "¡Gracias por darme " + comida + "! 🦊💖";

}


function beberAgua(){

    agua += 5;

    if(agua > 100){
        agua = 100;
    }

    document.getElementById("agua").value = agua;

    document.getElementById("mensaje").innerHTML =
    "¡Estoy hidratado! 💧🦊";

}

</script>
