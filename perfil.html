<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>

    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <div class="contenedor">

        <img src="zorrito.png" class="zorrito" alt="Zorrito">

        <h1>🦊 ReConecta</h1>

        <p>Construye hábitos saludables junto a tu nuevo compañero.</p>

        <form>

            <label>Nombre</label>
            <input type="text" placeholder="Escribe tu nombre">

            <label>Edad</label>
            <input type="number" placeholder="Tu edad">

            <label>Sexo</label>
            <select>
                <option>Selecciona una opción</option>
                <option>Femenino</option>
                <option>Masculino</option>
                <option>Prefiero no decirlo</option>
            </select>

            <label>¿Cómo quieres llamar a tu zorrito?</label>
            <input type="text" placeholder="Nombre del zorrito">

            <label>¿Por qué deseas mejorar tus hábitos?</label>
            <textarea placeholder="Escribe aquí..."></textarea>

            <button type="submit">Continuar</button>

        </form>

    </div>

</body>
</html>
